<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KTMGuard Dashboard - Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body class="login-body">

<div class="login-card">
  <div class="login-brand">
    <svg class="login-brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 2 4 5v6c0 5 3.4 8.6 8 9 4.6-.4 8-4 8-9V5l-8-3Z" stroke-linejoin="round"/><path d="m9 12 2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    KTMGuard
  </div>
  <p class="login-sub">Zero Trust Configuration Dashboard</p>

  {% if error %}<div class="login-error">{{ error }}</div>{% endif %}

  <form method="post" action="{{ url_for('login') }}" class="login-form">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus autocomplete="current-password" spellcheck="false">
    <button type="submit" class="btn-primary login-btn">Log In</button>
  </form>

  <p class="login-hint">
    First run? The password was printed to the console that started the
    dashboard, or set via <code>KTMGUARD_DASHBOARD_PASSWORD</code>.
  </p>
</div>

</body>
</html>
